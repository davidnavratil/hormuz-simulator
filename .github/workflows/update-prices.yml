name: Update oil & gas prices

on:
  schedule:
    - cron: '17 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch latest prices
        run: python3 scripts/update_prices.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet && echo "No price changes" && exit 0
          git commit -m "Update prices: $(date -u +%Y-%m-%d)"
          git push
